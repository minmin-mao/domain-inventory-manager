version: "3.9"

services:
  local-postgres:
    image: postgres:16-alpine
    container_name: domain-manager-local-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: domain_manager_local
    ports:
      - "5433:5432"
    volumes:
      - domain-manager-local-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d domain_manager_local"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  domain-manager-local-pgdata:
